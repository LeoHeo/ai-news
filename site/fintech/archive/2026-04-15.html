    <script>
    function copyArticle(btn) {
        var article = btn.closest('.news-item');
        var link = article.querySelector('h3 a');
        var summary = article.querySelector('.summary');
        var title = link.textContent.trim();
        var url = link.href;
        var text = summary.textContent.trim();

        var html = '<a href="' + url + '">' + title + '</a><br><br>' + text;
        var plain = title + '\n' + url + '\n\n' + text;

        navigator.clipboard.write([
            new ClipboardItem({
                'text/html': new Blob([html], { type: 'text/html' }),
                'text/plain': new Blob([plain], { type: 'text/plain' })
            })
        ]).then(function() {
            btn.classList.add('copied');
            setTimeout(function() { btn.classList.remove('copied'); }, 1500);
