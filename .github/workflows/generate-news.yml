name: Generate AI News Daily

on:
  schedule:
    - cron: '3 23 * * *'  # 08:03 KST daily
  workflow_dispatch:  # 수동 실행 가능

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Generate AI News
        uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            Read scripts/generate.md and follow ALL instructions exactly.

            Execute the full 7-step pipeline:
            1. Load config: Read config/sources.json
            2. Web Search: Read scripts/search-strategy.md, then execute 3-Layer WebSearch (L1: 5 authority sites, L2: 4 thematic queries, L3: 3 Korean queries = max 12 calls)
            3. Curate: Read scripts/curation-rules.md, then filter to 10-20 high-quality articles with categories, ratings, and Korean translations
            4. Verify: Read scripts/verification.md, then run 3-stage hallucination verification (URL validity → cross-verify with original → metadata completeness)
            5. Generate HTML: Read templates/news.html, generate site/index.html + site/archive/{YYYY-MM-DD}.html + update site/archive/index.html
            6. Archive Cleanup: Delete archive files older than 90 days
            7. Deploy: git add site/ && git commit -m "chore: update ai news $(date +%Y-%m-%d)" && git push origin main

            IMPORTANT:
            - Escape HTML special characters in all news titles and summaries (XSS prevention)
            - Only include https:// URLs
            - If WebSearch returns 0 results, create a minimal page with "뉴스 수집 실패" message
            - If fewer than 5 articles after curation, add "오늘은 주요 AI 뉴스가 적습니다" notice
            - On git push failure, retry once
          model: claude-sonnet-4-6
          allowed_tools: Bash,Read,Write,Edit,Glob,Grep,WebSearch,WebFetch
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  deploy:
    needs: generate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
