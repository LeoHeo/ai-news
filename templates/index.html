<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Daily</title>
    <!-- SEO Meta -->
    <meta name="description" content="AI-curated daily news across topics">
    <link rel="canonical" href="{site_url}">
    <!-- Open Graph -->
    <meta property="og:title" content="News Daily">
    <meta property="og:description" content="AI-curated daily news across topics">
    <meta property="og:type" content="website">
    <meta property="og:url" content="{site_url}">
    <meta property="og:image" content="{site_url}/assets/og-home.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:locale" content="ko_KR">
    <meta property="og:site_name" content="News Daily">
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="News Daily">
    <meta name="twitter:description" content="AI-curated daily news across topics">
    <meta name="twitter:image" content="{site_url}/assets/og-home.png">
    <!-- JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "News Daily",
      "description": "AI-curated daily news across topics",
      "url": "{site_url}",
      "inLanguage": "ko"
    }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>News Daily</h1>
        <p class="summary">AI-curated daily news across topics</p>
    </header>

    <nav class="topic-tabs">
        <!-- 토픽별 탭 (generate.md Step 5d에서 동적 생성) -->
        <a href="{topic_id}/index.html" class="tab">{topic_name_ko}</a>
    </nav>

    <main>
        <!-- 각 토픽의 최신 뉴스 요약 카드 -->
        <section class="topic-card">
            <h2><a href="{topic_id}/index.html">{topic_name}</a></h2>
            <p class="date">{date}</p>
            <p class="count">{topic_name_ko} {total_count}건</p>
            <a href="{topic_id}/index.html" class="read-more">자세히 보기</a>
        </section>
    </main>

    <footer>
        <p>Curated by Claude | Auto-generated</p>
        <p class="disclaimer">이 페이지의 뉴스는 AI가 자동 수집·요약한 것입니다.
           정확한 내용은 원문 링크를 확인하세요.</p>
    </footer>
</body>
</html>
